<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>JARVIS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#e8e8f0;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

#app{display:flex;flex-direction:column;height:100dvh;padding:16px;gap:10px}

header{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:800;letter-spacing:3px;color:#00e5ff}
#pill{padding:4px 14px;border-radius:20px;background:#12121a;border:1px solid #333;color:#555570;font-size:12px;font-family:monospace;transition:all .3s}

#chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px}
#chat::-webkit-scrollbar{width:2px}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#333355;text-align:center}
.empty-icon{font-size:48px}
.empty p{font-size:13px;font-family:monospace;line-height:1.9;color:#444466}

.msg{display:flex;flex-direction:column;gap:2px}
.msg.user{align-items:flex-end}
.msg.ai{align-items:flex-start}
.msg.error{align-items:flex-start}
.lbl{font-size:10px;color:#444;font-family:monospace;text-transform:uppercase;letter-spacing:1px;padding:0 4px}
.bbl{padding:10px 14px;font-size:14px;line-height:1.6;max-width:88%;word-break:break-word;border-radius:12px}
.msg.user .bbl{background:rgba(0,229,255,.09);border:1px solid rgba(0,229,255,.2);color:#b0eeff;border-radius:12px 12px 3px 12px}
.msg.ai .bbl{background:#131320;border:1px solid #1e1e2e;color:#e0e0f0;border-radius:3px 12px 12px 12px}
.msg.error .bbl{background:rgba(255,60,90,.08);border:1px solid rgba(255,60,90,.25);color:#ff6080;border-radius:3px 12px 12px 12px}

/* Interim text */
#interim{font-size:13px;color:rgba(0,229,255,.5);font-style:italic;min-height:20px;padding:2px 4px;text-align:center}

/* Thinking dots */
#dots{display:none;gap:5px;align-items:center;padding:10px 14px;background:#131320;border:1px solid #1e1e2e;border-radius:3px 12px 12px 12px;width:fit-content}
#dots span{width:7px;height:7px;border-radius:50%;background:#00e5ff}
#dots span:nth-child(1){animation:bn 1.2s 0s infinite}
#dots span:nth-child(2){animation:bn 1.2s .2s infinite}
#dots span:nth-child(3){animation:bn 1.2s .4s infinite}

/* Big button */
.btn-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0 4px}
#btn{width:76px;height:76px;border-radius:50%;border:2px solid #1e1e2e;background:#0e0e1a;font-size:28px;cursor:pointer;outline:none;transition:all .35s;position:relative}
#btn.on{border-color:#00e5a0;box-shadow:0 0 0 6px rgba(0,229,160,.1),0 0 20px rgba(0,229,160,.2)}
#btn.thinking{border-color:#00e5ff;box-shadow:0 0 0 6px rgba(0,229,255,.1);animation:spin-border 1s linear infinite}
#btn.speaking{border-color:#a78bfa;box-shadow:0 0 0 6px rgba(167,139,250,.1),0 0 20px rgba(167,139,250,.2)}

.btn-row{display:flex;gap:10px;align-items:center}
#hint{font-size:11px;font-family:monospace;color:#444466}
.sm{background:none;border:1px solid #1e1e2e;border-radius:8px;color:#444466;font-size:11px;padding:4px 10px;cursor:pointer}

/* Modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:99;display:none;align-items:flex-end;padding:16px}
#modal.open{display:flex}
.mbox{background:#0e0e1a;border:1px solid #1e1e2e;border-radius:18px;padding:22px;width:100%;display:flex;flex-direction:column;gap:12px}
.mtitle{font-size:18px;font-weight:800;color:#00e5ff}
.mdesc{font-size:13px;color:#666;line-height:1.6}
.mdesc a{color:#00e5ff;text-decoration:none}
#ki{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;padding:13px;color:#e8e8f0;font-family:monospace;font-size:13px;outline:none;width:100%}
#kerr{color:#ff4566;font-size:12px;font-family:monospace;display:none}
.msave{background:#00e5ff;color:#000;font-weight:700;font-size:15px;border:none;border-radius:10px;padding:13px;cursor:pointer;width:100%}
.mcancel{background:none;border:none;color:#555;font-size:13px;cursor:pointer;text-align:center}

@keyframes bn{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-5px);opacity:1}}
@keyframes spin-border{to{transform:rotate(360deg)}}
@keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">JARVIS</div>
    <div id="pill">inativo</div>
  </header>

  <div id="chat">
    <div class="empty" id="empty">
      <div class="empty-icon">🤖</div>
      <p>Toque ▶ e fale.<br>Quando parar de falar<br>eu respondo automaticamente.</p>
    </div>
    <div id="dots"><span></span><span></span><span></span></div>
  </div>

  <div id="interim"></div>

  <div class="btn-wrap">
    <button id="btn" onclick="toggle()">▶</button>
    <div class="btn-row">
      <span id="hint">toque para ativar</span>
      <button class="sm" onclick="clearAll()">limpar</button>
      <button class="sm" onclick="openModal()">🔑</button>
    </div>
  </div>
</div>

<div id="modal">
  <div class="mbox">
    <div class="mtitle">🔑 Chave API</div>
    <p class="mdesc">Crie em <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys</p>
    <input type="password" id="ki" placeholder="sk-ant-...">
    <div id="kerr">Deve começar com sk-</div>
    <button class="msave" onclick="saveKey()">Salvar</button>
    <button class="mcancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
const SYSTEM = `Você é Jarvis, assistente de IA sofisticado inspirado no assistente do Tony Stark. Responda em português brasileiro. Seja direto e inteligente. Máximo 2-3 frases, a menos que seja algo complexo.`;

let key = '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', active = false, processing = false, history = [], rec = null, micStream = null;

try { key = localStorage.getItem('jv_key') || ''; } catch(_){}
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = ()=>window.speechSynthesis.getVoices();

// ── Status ──────────────────────────────────────────────────
const STATES = {
  off:      {pill:'inativo',   color:'#444466', hint:'toque para ativar', icon:'▶'},
  on:       {pill:'ouvindo',   color:'#00e5a0', hint:'fale agora...',     icon:'🎙'},
  thinking: {pill:'pensando',  color:'#00e5ff', hint:'processando...',    icon:'🧠'},
  speaking: {pill:'falando',   color:'#a78bfa', hint:'respondendo...',    icon:'🔊'},
};

function ui(state) {
  const s = STATES[state];
  const pill = document.getElementById('pill');
  pill.textContent = s.pill;
  pill.style.color = s.color;
  pill.style.borderColor = s.color + '55';
  document.getElementById('hint').textContent = s.hint;
  const btn = document.getElementById('btn');
  btn.textContent = s.icon;
  btn.className = state === 'off' ? '' : state === 'on' ? 'on' : state === 'thinking' ? 'thinking' : 'speaking';
  document.getElementById('dots').style.display = state === 'thinking' ? 'flex' : 'none';
}

// ── Chat ────────────────────────────────────────────────────
function addMsg(role, text) {
  document.getElementById('empty')?.remove();
  const chat = document.getElementById('chat');
  const dots = document.getElementById('dots');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.style.animation = 'si .3s ease';
  const l = document.createElement('div'); l.className = 'lbl';
  l.textContent = role === 'user' ? 'você' : role === 'error' ? 'erro' : 'jarvis';
  const b = document.createElement('div'); b.className = 'bbl';
  b.textContent = text;
  d.appendChild(l); d.appendChild(b);
  chat.insertBefore(d, dots);
  chat.scrollTop = chat.scrollHeight;
}

function setInterim(t) {
  document.getElementById('interim').textContent = t;
}

function clearAll() {
  history = [];
  setInterim('');
  const chat = document.getElementById('chat');
  chat.innerHTML = `<div class="empty" id="empty"><div class="empty-icon">🤖</div><p>Toque ▶ e fale.<br>Quando parar de falar<br>eu respondo automaticamente.</p></div><div id="dots"><span></span><span></span><span></span></div>`;
}

// ── TTS ─────────────────────────────────────────────────────
function speak(text, onDone) {
  const s = window.speechSynthesis;
  if(!s){onDone();return;}
  s.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='pt-BR'; u.rate=1.05;
  const vs = s.getVoices();
  const pt = vs.find(v=>v.lang.startsWith('pt')&&v.localService)||vs.find(v=>v.lang.startsWith('pt'));
  if(pt) u.voice=pt;
  u.onend=onDone; u.onerror=onDone;
  s.speak(u);
}

// ── Claude ──────────────────────────────────────────────────
async function ask(text) {
  if(!key||processing) return;
  processing=true;
  ui('thinking');
  setInterim('');
  addMsg('user', text);
  history.push({role:'user',content:text});

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:SYSTEM,
        messages:history
      })
    });
    const data = await r.json();
    if(data.error){
      addMsg('error','⚠ '+( data.error.message||'Erro na API'));
      history.pop(); processing=false;
      if(active){ui('on');listen();}
      return;
    }
    const reply = data.content?.[0]?.text||'Sim?';
    history.push({role:'assistant',content:reply});
    addMsg('ai',reply);
    ui('speaking');
    speak(reply,()=>{
      processing=false;
      if(active){ui('on');listen();}
    });
  } catch {
    addMsg('error','⚠ Sem conexão.');
    history.pop(); processing=false;
    if(active){ui('on');listen();}
  }
}

// ── Recognition ─────────────────────────────────────────────
function listen() {
  if(!active||processing) return;
  setInterim('');
  try{rec?.stop();}catch(_){}

  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addMsg('error','⚠ Use o Chrome.');stopAll();return;}

  const r = new SR();
  r.lang='pt-BR';
  r.interimResults=true;
  r.continuous=false;
  r.maxAlternatives=1;

  r.onresult=(e)=>{
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) fin+=e.results[i][0].transcript;
      else int+=e.results[i][0].transcript;
    }
    if(int||fin) setInterim(fin||int);
    if(fin.trim().length>1&&!processing) ask(fin.trim());
  };

  r.onerror=(e)=>{
    if(!active) return;
    if(e.error==='not-allowed'){addMsg('error','⚠ Microfone bloqueado.');stopAll();return;}
    setTimeout(listen,500);
  };

  r.onend=()=>{
    if(!active||processing) return;
    setTimeout(listen,200);
  };

  rec=r;
  try{r.start();}catch(_){setTimeout(listen,500);}
}

// ── Toggle ───────────────────────────────────────────────────
async function toggle(){
  if(!key){openModal();return;}
  if(active){stopAll();}
  else{
    try{
      micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    }catch{
      addMsg('error','⚠ Microfone bloqueado. Permita o acesso.');
      return;
    }
    active=true; processing=false;
    ui('on');
    listen();
  }
}

function stopAll(){
  active=false; processing=false;
  window.speechSynthesis?.cancel();
  try{rec?.stop();}catch(_){}
  rec=null;
  micStream?.getTracks().forEach(t=>t.stop());
  setInterim('');
  ui('off');
}

// ── Modal ────────────────────────────────────────────────────
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function saveKey(){
  const v=document.getElementById('ki').value.trim();
  if(!v.startsWith('sk-')){document.getElementById('kerr').style.display='block';return;}
  document.getElementById('kerr').style.display='none';
  try{localStorage.setItem('jv_key',v);}catch(_){}
  key=v; closeModal();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('ki').addEventListener('keydown',e=>{if(e.key==='Enter')saveKey();});

if(!key) openModal();
</script>
</body>
</html>
